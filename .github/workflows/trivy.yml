name: Trivy (Container Image Scan)

on:
  push:
    branches: ["main"]
    paths:
      - "app/**"
  pull_request:
    branches: ["main"]
    paths:
      - "app/**"
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build rag-api image
        # Build context is app/, with the Dockerfile at app/rag-api/Dockerfile
        # — NOT context=./app/rag-api. This matches the corrected Dockerfile
        # (and build-and-push.yml) after the real CrashLoopBackOff caused by
        # a too-narrow build context excluding the sibling guardrail modules.
        # See app/README.md for the full incident writeup.
        run: docker build -t rag-api:scan -f app/rag-api/Dockerfile app

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-api:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: "true"

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: "trivy-container-scan"